steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/gymtracker:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/run"
    args:
      - "deploy"
      - "gymtracker"
      - "--image"
      - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/gymtracker:latest"

