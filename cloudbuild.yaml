steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/gymtracker:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "gym-tracker"
      - "--image"
      - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"
      - "--region"
      - "us-east4"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--add-cloudsql-instances"
      - "orchestrina-165805:us-east4:shrivar-personal"

images:
  - "gcr.io/$PROJECT_ID/gymtracker:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/gymtracker:latest"

